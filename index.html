<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Billing Statement</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <h1>Water Billing Statement</h1>

    <!-- Customer Name textbox -->
    <label for="customerName">Customer Name</label>
    <input type="text" id="customerName" placeholder="Enter customer name">

    <!-- Water Consumption textbox -->
    <label for="consumption">Water Consumption (Cubic Meter)</label>
    <input type="number" id="consumption" placeholder="Enter cubic meters used" min="0">

    <!-- Customer Type dropdown -->
    <label for="customerType">Customer Type</label>
    <select id="customerType">
      <option value="Regular">Regular</option>
      <option value="Senior Citizen">Senior Citizen</option>
      <option value="Solo Parent">Solo Parent</option>
    </select>

    <!-- Generate Bill button -->
    <button id="generateBtn">Generate Bill</button>

    <!-- Transactions Processed counter -->
    <p id="counter" class="counter">Transactions Processed : 0</p>

    <!-- Billing Statement output area -->
    <pre id="output" class="output"></pre>
  </main>

  <script src="script.js"></script>
</body>
</html>
